<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Registro presenze</title>
<style>
  :root {
    --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, Menlo, monospace;
    --color-text-primary: #1a1a18;
    --color-text-secondary: #55534d;
    --color-text-tertiary: #8a887f;
    --color-text-danger: #A32D2D;
    --color-background-primary: #ffffff;
    --color-background-secondary: #f5f4ef;
    --color-background-danger: #FCEBEB;
    --color-border-primary: rgba(0,0,0,0.40);
    --color-border-secondary: rgba(0,0,0,0.18);
    --color-border-tertiary: rgba(0,0,0,0.10);
    --color-border-danger: #F09595;
    --border-radius-md: 8px;
    --border-radius-lg: 12px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #faf9f5; }
  body { font-family: var(--font-sans); -webkit-text-size-adjust: 100%; }
  input[type="date"], select { font-family: var(--font-sans); }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const SUPABASE_URL = "https://esowfbptahnzxbathqzf.supabase.co";
const SUPABASE_KEY = "sb_publishable_lil3SYpFe57jbIDNgGryNw_a-tU29Cl";

const RUOLI = {
  docente:    { email: "docente@registro.app",    label: "Docente" },
  segreteria: { email: "segreteria@registro.app", label: "Segreteria" },
};

const HOURS = ['08:30','09:30','10:30','11:30','12:30','13:30'];
const HOUR_END = {'08:30':'09:30','09:30':'10:30','10:30':'11:30','11:30':'12:30','12:30':'13:30','13:30':'14:30'};
const MESI = ["gennaio","febbraio","marzo","aprile","maggio","giugno","luglio","agosto","settembre","ottobre","novembre","dicembre"];
const CYCLE = [null,'presente','assente','ritardo'];
const ST = {
  presente: { bg:'#EAF3DE', fg:'#3B6D11', l:'P' },
  assente:  { bg:'#FCEBEB', fg:'#A32D2D', l:'A' },
  ritardo:  { bg:'#FAEEDA', fg:'#854F0B', l:'R' },
};

async function sb(path, opts = {}, token) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...opts,
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${token || SUPABASE_KEY}`,
      "Content-Type": "application/json",
      ...(opts.headers || {}),
    },
  });
  if (!res.ok) throw new Error(`${res.status} ${await res.text()}`);
  const txt = await res.text();
  return txt ? JSON.parse(txt) : null;
}

async function signIn(email, password) {
  const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
    method: "POST",
    headers: { apikey: SUPABASE_KEY, "Content-Type": "application/json" },
    body: JSON.stringify({ email, password }),
  });
  if (!res.ok) throw new Error("Password non corretta");
  return res.json();
}

function monthRange(ym) {
  const [y, m] = ym.split("-").map(Number);
  const start = `${ym}-01`;
  const nm = m === 12 ? `${y+1}-01` : `${y}-${String(m+1).padStart(2,"0")}`;
  return { start, endExcl: `${nm}-01` };
}

function useIsMobile() {
  const [m, setM] = useState(typeof window !== "undefined" && window.innerWidth < 640);
  useEffect(() => {
    const onR = () => setM(window.innerWidth < 640);
    window.addEventListener("resize", onR);
    return () => window.removeEventListener("resize", onR);
  }, []);
  return m;
}

function Login({ onLogin }) {
  const [ruolo, setRuolo] = useState("docente");
  const [pw, setPw] = useState("");
  const [err, setErr] = useState(null);
  const [busy, setBusy] = useState(false);

  const entra = async () => {
    setErr(null); setBusy(true);
    try {
      const r = RUOLI[ruolo];
      const data = await signIn(r.email, pw);
      onLogin({ ruolo, token: data.access_token, refresh: data.refresh_token });
    } catch (e) {
      setErr("Password non corretta. Riprova.");
    } finally { setBusy(false); }
  };

  const card = {fontSize:14,padding:"7px 14px",borderRadius:"var(--border-radius-md)",cursor:"pointer",border:"0.5px solid var(--color-border-secondary)",background:"transparent",color:"var(--color-text-primary)"};
  const cardA = {...card,background:"var(--color-background-secondary)",fontWeight:500,border:"0.5px solid var(--color-border-primary)"};
  const cardBlue = {...card,background:"#1F3864",color:"#fff",fontWeight:500,border:"0.5px solid #1F3864"};

  return (
    <div style={{maxWidth:360,margin:"48px auto",padding:"0 16px",fontFamily:"var(--font-sans)",color:"var(--color-text-primary)"}}>
      <div style={{textAlign:"center",marginBottom:18}}>
        <img src="logo.png" alt="Logo" style={{maxWidth:220,maxHeight:160,height:"auto",width:"auto"}} />
      </div>
      <div style={{fontSize:20,fontWeight:500,marginBottom:6,textAlign:"center"}}>Registro presenze</div>
      <div style={{fontSize:13,color:"var(--color-text-secondary)",marginBottom:24,textAlign:"center"}}>Accedi per continuare</div>

      <div style={{fontSize:12,color:"var(--color-text-tertiary)",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Ruolo</div>
      <div style={{display:"flex",gap:8,marginBottom:18}}>
        <button style={ruolo==="docente"?cardBlue:card} onClick={()=>setRuolo("docente")}>Docente</button>
        <button style={ruolo==="segreteria"?cardBlue:card} onClick={()=>setRuolo("segreteria")}>Segreteria</button>
      </div>

      <div style={{fontSize:12,color:"var(--color-text-tertiary)",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:8}}>Password</div>
      <input type="password" value={pw} autoFocus
        onChange={e=>setPw(e.target.value)}
        onKeyDown={e=>e.key==="Enter"&&pw&&!busy&&entra()}
        style={{width:"100%",fontSize:16,padding:"10px 12px",border:"0.5px solid var(--color-border-secondary)",borderRadius:"var(--border-radius-md)",background:"transparent",color:"var(--color-text-primary)",outline:"none",marginBottom:14,boxSizing:"border-box"}} />

      {err && <div style={{fontSize:13,color:"var(--color-text-danger)",marginBottom:12}}>{err}</div>}

      <button onClick={entra} disabled={!pw||busy}
        style={{width:"100%",fontSize:16,padding:"11px",borderRadius:"var(--border-radius-md)",cursor:pw&&!busy?"pointer":"default",border:"none",background:pw&&!busy?"#1F3864":"var(--color-background-secondary)",color:pw&&!busy?"#fff":"var(--color-text-tertiary)",fontWeight:500}}>
        {busy?"Accesso…":"Entra"}
      </button>
    </div>
  );
}

function App() {
  const [auth, setAuth] = useState(null);
  if (!auth) return <Login onLogin={setAuth} />;
  return <Registro auth={auth} onLogout={()=>setAuth(null)} />;
}

function Registro({ auth, onLogout }) {
  const isSegreteria = auth.ruolo === "segreteria";
  const tok = auth.token;
  const isMobile = useIsMobile();
  const [classes, setClasses] = useState([]);
  const [students, setStudents] = useState([]);
  const [presenze, setPresenze] = useState([]);
  const [selCls, setSelCls] = useState(null);
  const [date, setDate] = useState(new Date().toISOString().split("T")[0]);
  const [view, setView] = useState("reg");
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState(null);
  const [newCls, setNewCls] = useState("");
  const [newStu, setNewStu] = useState("");
  const [editCls, setEditCls] = useState(null);
  const [editStu, setEditStu] = useState(null);

  const loadAll = useCallback(async () => {
    try {
      setErr(null);
      const [cls, stu] = await Promise.all([
        sb("classi?select=*&order=nome", {}, tok),
        sb("studenti?select=*&order=nome", {}, tok),
      ]);
      setClasses(cls || []);
      setStudents(stu || []);
      setSelCls(prev => prev || (cls && cls.length ? cls[0].id : null));
    } catch (e) {
      setErr("Errore di connessione al database: " + e.message);
    } finally {
      setLoading(false);
    }
  }, [tok]);

  const loadPresenze = useCallback(async () => {
    try {
      const p = await sb(`presenze?select=*&data=eq.${date}`, {}, tok);
      setPresenze(p || []);
    } catch (e) {
      setErr("Errore nel caricare le presenze: " + e.message);
    }
  }, [date, tok]);

  useEffect(() => { loadAll(); }, [loadAll]);
  useEffect(() => { loadPresenze(); }, [loadPresenze]);

  const cls = classes.find(c => c.id === selCls);
  const clsStudents = students.filter(s => s.classe_id === selCls);

  const presKey = (sid, h) => presenze.find(p => p.studente_id === sid && p.fascia === h);
  const stateOf = (sid, h) => presKey(sid, h)?.stato || null;
  const giustOf = (sid, h) => presKey(sid, h)?.giustificato || false;

  const cycleHour = async (sid, h) => {
    const cur = stateOf(sid, h);
    const next = CYCLE[(CYCLE.indexOf(cur) + 1) % CYCLE.length];
    const existing = presKey(sid, h);
    setPresenze(prev => {
      const others = prev.filter(p => !(p.studente_id === sid && p.fascia === h));
      return next ? [...others, { ...(existing||{}), studente_id: sid, fascia: h, data: date, stato: next, giustificato: false }] : others;
    });
    try {
      if (next === null) {
        if (existing?.id) await sb(`presenze?id=eq.${existing.id}`, { method: "DELETE" }, tok);
      } else {
        await sb("presenze?on_conflict=studente_id,data,fascia", {
          method: "POST",
          headers: { Prefer: "resolution=merge-duplicates" },
          body: JSON.stringify({ studente_id: sid, data: date, fascia: h, stato: next, giustificato: false }),
        }, tok);
        loadPresenze();
      }
    } catch (e) { setErr("Errore nel salvataggio: " + e.message); loadPresenze(); }
  };

  const toggleGiust = async (sid, h) => {
    if (!isSegreteria) return;
    const existing = presKey(sid, h);
    if (!existing || !existing.stato) return;
    const newVal = !existing.giustificato;
    setPresenze(prev => prev.map(p => (p.studente_id===sid && p.fascia===h) ? { ...p, giustificato:newVal } : p));
    try {
      await sb("presenze?on_conflict=studente_id,data,fascia", {
        method: "POST",
        headers: { Prefer: "resolution=merge-duplicates" },
        body: JSON.stringify({ studente_id: sid, data: date, fascia: h, stato: existing.stato, giustificato: newVal }),
      }, tok);
      loadPresenze();
    } catch (e) { setErr("Errore: " + e.message); loadPresenze(); }
  };

  const setAll = async (sid, status) => {
    try {
      const rows = HOURS.map(h => ({ studente_id: sid, data: date, fascia: h, stato: status, giustificato: false }));
      await sb("presenze?on_conflict=studente_id,data,fascia", {
        method: "POST",
        headers: { Prefer: "resolution=merge-duplicates" },
        body: JSON.stringify(rows),
      }, tok);
      loadPresenze();
    } catch (e) { setErr("Errore: " + e.message); }
  };

  const addCls = async () => {
    const nome = newCls.trim(); if (!nome) return;
    try {
      const [c] = await sb("classi", { method: "POST", headers: { Prefer: "return=representation" }, body: JSON.stringify({ nome }) }, tok);
      setNewCls(""); await loadAll(); if (c) setSelCls(c.id);
    } catch (e) { setErr("Errore: " + e.message); }
  };

  const addStu = async () => {
    const nome = newStu.trim(); if (!nome || !cls) return;
    try {
      await sb("studenti", { method: "POST", body: JSON.stringify({ nome, classe_id: cls.id }) }, tok);
      setNewStu(""); loadAll();
    } catch (e) { setErr("Errore: " + e.message); }
  };

  const remCls = async (id) => {
    try { await sb(`classi?id=eq.${id}`, { method: "DELETE" }, tok); if (selCls===id) setSelCls(null); loadAll(); }
    catch (e) { setErr("Errore: " + e.message); }
  };

  const remStu = async (id) => {
    try { await sb(`studenti?id=eq.${id}`, { method: "DELETE" }, tok); loadAll(); }
    catch (e) { setErr("Errore: " + e.message); }
  };

  const renameCls = async (id, nome) => {
    const n = (nome||"").trim(); if (!n) return;
    try { await sb(`classi?id=eq.${id}`, { method: "PATCH", body: JSON.stringify({ nome:n }) }, tok); setEditCls(null); loadAll(); }
    catch (e) { setErr("Errore: " + e.message); }
  };

  const renameStu = async (id, nome) => {
    const n = (nome||"").trim(); if (!n) return;
    try { await sb(`studenti?id=eq.${id}`, { method: "PATCH", body: JSON.stringify({ nome:n }) }, tok); setEditStu(null); loadAll(); }
    catch (e) { setErr("Errore: " + e.message); }
  };

  const b = {fontSize:13,padding:"5px 12px",border:"0.5px solid var(--color-border-secondary)",borderRadius:"var(--border-radius-md)",background:"transparent",cursor:"pointer",color:"var(--color-text-primary)"};
  const bA = {...b,background:"var(--color-background-secondary)",fontWeight:500,border:"0.5px solid var(--color-border-primary)"};
  const bBlue = {...b,background:"#1F3864",color:"#fff",fontWeight:500,border:"0.5px solid #1F3864"};
  const inp = {fontSize:13,padding:"5px 10px",border:"0.5px solid var(--color-border-secondary)",borderRadius:"var(--border-radius-md)",background:"transparent",color:"var(--color-text-primary)",outline:"none"};
  const th = {fontSize:11,color:"var(--color-text-secondary)",fontWeight:400,textTransform:"uppercase",letterSpacing:"0.04em",padding:"8px 4px",textAlign:"center"};

  const giustBadge = (sid,h,state,giust,size) => {
    const canGiust = state==='assente' || state==='ritardo';
    if (!canGiust || !(giust || isSegreteria)) return null;
    const sz = size || 15;
    return (
      <span onClick={(e)=>{e.stopPropagation();toggleGiust(sid,h);}}
        title={giust?"Giustificata":"Segna come giustificata"}
        style={{position:"absolute",top:-sz/3,right:-sz/3,width:sz,height:sz,borderRadius:"50%",fontSize:sz*0.6,fontWeight:600,lineHeight:sz+"px",textAlign:"center",cursor:isSegreteria?"pointer":"default",
          background:giust?"#3B6D11":"var(--color-background-primary)",
          color:giust?"#fff":"var(--color-text-tertiary)",
          border:giust?"1px solid #3B6D11":"1px solid var(--color-border-secondary)"}}>
        G
      </span>
    );
  };

  const registerView = () => {
    if (!cls) {
      return classes.length>0
        ? <div style={{padding:"20px 0",color:"var(--color-text-tertiary)",fontSize:14}}>Seleziona una classe.</div>
        : null;
    }

    if (isMobile) {
      return (
        <div>
          {clsStudents.length===0 && (
            <div style={{padding:"16px 4px",fontSize:14,color:"var(--color-text-tertiary)"}}>Nessuno studente.{isSegreteria?" Aggiungili dalla sezione Gestione.":""}</div>
          )}
          {clsStudents.map(s=>(
            <div key={s.id} style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-lg)",padding:"12px 12px 14px",marginBottom:10}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <span style={{flex:1,fontSize:15,fontWeight:500}}>{s.nome}</span>
                {CYCLE.filter(Boolean).map(st=>(
                  <button key={st} onClick={()=>setAll(s.id,st)} title={`Tutta la giornata: ${st}`}
                    style={{width:30,height:30,borderRadius:6,cursor:"pointer",border:`1px solid ${ST[st].fg}55`,background:ST[st].bg,color:ST[st].fg,fontSize:13,fontWeight:600}}>
                    {ST[st].l}
                  </button>
                ))}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                {HOURS.map(h=>{
                  const state = stateOf(s.id,h);
                  const info = state ? ST[state] : null;
                  const giust = giustOf(s.id,h);
                  return (
                    <div key={h} style={{position:"relative"}}>
                      <button onClick={()=>cycleHour(s.id,h)}
                        style={{width:"100%",height:58,borderRadius:"var(--border-radius-md)",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1,
                          border:info?`1px solid ${info.fg}55`:"0.5px solid var(--color-border-tertiary)",
                          background:info?info.bg:"var(--color-background-secondary)",
                          color:info?info.fg:"var(--color-text-tertiary)"}}>
                        <span style={{fontSize:11,opacity:0.8}}>{h}<span style={{opacity:0.6}}>→{HOUR_END[h]}</span></span>
                        <span style={{fontSize:20,fontWeight:600}}>{info?info.l:"·"}</span>
                      </button>
                      {giustBadge(s.id,h,state,giust,20)}
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
          <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginTop:4,paddingLeft:2}}>
            Tocca una fascia per ciclare presente → assente → ritardo → vuoto. La pallina <strong>G</strong> indica le giustificazioni{isSegreteria?" — toccala per giustificare.":"."}
          </div>
        </div>
      );
    }

    return (
      <div>
        <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-lg)",overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse",tableLayout:"fixed"}}>
            <colgroup>
              <col style={{width:140}} />
              <col style={{width:68}} />
              {HOURS.map(h=><col key={h} style={{width:48}} />)}
            </colgroup>
            <thead>
              <tr style={{background:"var(--color-background-secondary)",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
                <th style={{...th,textAlign:"left",padding:"8px 12px"}}>Studente</th>
                <th style={th}>Tutta la giornata</th>
                {HOURS.map(h=>(
                  <th key={h} style={th}>
                    <div>{h}</div>
                    <div style={{fontSize:10,color:"var(--color-text-tertiary)",fontWeight:400}}>→{HOUR_END[h]}</div>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {clsStudents.length===0 && (
                <tr><td colSpan={8} style={{padding:"20px 14px",fontSize:13,color:"var(--color-text-tertiary)"}}>Nessuno studente.{isSegreteria?" Aggiungili dalla sezione Gestione.":""}</td></tr>
              )}
              {clsStudents.map((s,i)=>(
                <tr key={s.id} style={{borderTop:i>0?"0.5px solid var(--color-border-tertiary)":"none"}}>
                  <td style={{padding:"6px 12px",fontSize:13}}>{s.nome}</td>
                  <td style={{textAlign:"center",padding:"4px 2px"}}>
                    <div style={{display:"flex",justifyContent:"center",gap:3}}>
                      {CYCLE.filter(Boolean).map(st=>(
                        <button key={st} onClick={()=>setAll(s.id,st)} title={`Segna tutto come ${st}`}
                          style={{width:24,height:24,borderRadius:4,cursor:"pointer",border:`1px solid ${ST[st].fg}55`,background:ST[st].bg,color:ST[st].fg,fontSize:11,fontWeight:500}}>
                          {ST[st].l}
                        </button>
                      ))}
                    </div>
                  </td>
                  {HOURS.map(h=>{
                    const state = stateOf(s.id,h);
                    const info = state ? ST[state] : null;
                    const giust = giustOf(s.id,h);
                    return (
                      <td key={h} style={{textAlign:"center",padding:"4px 2px"}}>
                        <div style={{position:"relative",display:"inline-block"}}>
                          <button onClick={()=>cycleHour(s.id,h)}
                            title={info?`${state} — clicca per cambiare`:"Clicca per segnare"}
                            style={{width:40,height:30,borderRadius:"var(--border-radius-md)",cursor:"pointer",border:info?`1px solid ${info.fg}44`:"0.5px solid var(--color-border-tertiary)",background:info?info.bg:"transparent",color:info?info.fg:"var(--color-text-tertiary)",fontSize:13,fontWeight:info?500:400}}>
                            {info?info.l:"·"}
                          </button>
                          {giustBadge(s.id,h,state,giust,15)}
                        </div>
                      </td>
                    );
                  })}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginTop:8,paddingLeft:2}}>
          La pallina <strong>G</strong> sulle assenze e sui ritardi indica se sono giustificati{isSegreteria?" — toccala per giustificare.":" (solo la segreteria può modificarli)."}
        </div>
      </div>
    );
  };

  const content = (
    <>
      {view==="reg" && registerView()}
      {view==="stats" && cls && <StatsView cls={cls} clsStudents={clsStudents} date={date} tok={tok} />}
      {view==="export" && isSegreteria && <ExportView classes={classes} students={students} tok={tok} />}
      {view==="manage" && isSegreteria && (
        <div>
          <div style={{marginBottom:20}}>
            <div style={{fontSize:13,fontWeight:500,marginBottom:8}}>Aggiungi classe</div>
            <div style={{display:"flex",gap:8}}>
              <input style={{...inp,flex:1,maxWidth:240}} placeholder="Es. 3A — Classico" value={newCls} onChange={e=>setNewCls(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCls()} />
              <button style={b} onClick={addCls}>Aggiungi</button>
            </div>
          </div>
          <div style={{marginBottom:20}}>
            <div style={{fontSize:13,fontWeight:500,marginBottom:8}}>Classi esistenti</div>
            <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-lg)",overflow:"hidden"}}>
              {classes.length===0&&<div style={{padding:"12px 14px",fontSize:13,color:"var(--color-text-tertiary)"}}>Nessuna classe.</div>}
              {classes.map((c,i)=>(
                <div key={c.id} style={{display:"flex",alignItems:"center",padding:"9px 14px",borderTop:i>0?"0.5px solid var(--color-border-tertiary)":"none",gap:8}}>
                  {editCls && editCls.id===c.id ? (
                    <>
                      <input value={editCls.nome} autoFocus onChange={e=>setEditCls({...editCls,nome:e.target.value})}
                        onKeyDown={e=>{if(e.key==="Enter")renameCls(c.id,editCls.nome);if(e.key==="Escape")setEditCls(null);}}
                        style={{...inp,flex:1}} />
                      <button style={bBlue} onClick={()=>renameCls(c.id,editCls.nome)}>Salva</button>
                      <button style={b} onClick={()=>setEditCls(null)}>Annulla</button>
                    </>
                  ) : (
                    <>
                      <span style={{flex:1,fontSize:14}}>{c.nome}</span>
                      <span style={{fontSize:12,color:"var(--color-text-tertiary)"}}>{students.filter(s=>s.classe_id===c.id).length} studenti</span>
                      <button style={b} onClick={()=>setEditCls({id:c.id,nome:c.nome})}>Rinomina</button>
                      <button style={{...b,color:"#A32D2D",borderColor:"#F09595"}} onClick={()=>remCls(c.id)}>Rimuovi</button>
                    </>
                  )}
                </div>
              ))}
            </div>
          </div>
          {cls&&(
            <div>
              <div style={{fontSize:13,fontWeight:500,marginBottom:8}}>Studenti in <em>{cls.nome}</em></div>
              <div style={{display:"flex",gap:8,marginBottom:10}}>
                <input style={{...inp,flex:1,maxWidth:240}} placeholder="Cognome Nome" value={newStu} onChange={e=>setNewStu(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addStu()} />
                <button style={b} onClick={addStu}>Aggiungi</button>
              </div>
              <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-lg)",overflow:"hidden"}}>
                {clsStudents.length===0&&<div style={{padding:"12px 14px",fontSize:13,color:"var(--color-text-tertiary)"}}>Nessuno studente.</div>}
                {clsStudents.map((s,i)=>(
                  <div key={s.id} style={{display:"flex",alignItems:"center",padding:"9px 14px",borderTop:i>0?"0.5px solid var(--color-border-tertiary)":"none",gap:8}}>
                    {editStu && editStu.id===s.id ? (
                      <>
                        <input value={editStu.nome} autoFocus onChange={e=>setEditStu({...editStu,nome:e.target.value})}
                          onKeyDown={e=>{if(e.key==="Enter")renameStu(s.id,editStu.nome);if(e.key==="Escape")setEditStu(null);}}
                          style={{...inp,flex:1}} />
                        <button style={bBlue} onClick={()=>renameStu(s.id,editStu.nome)}>Salva</button>
                        <button style={b} onClick={()=>setEditStu(null)}>Annulla</button>
                      </>
                    ) : (
                      <>
                        <span style={{flex:1,fontSize:14}}>{s.nome}</span>
                        <button style={b} onClick={()=>setEditStu({id:s.id,nome:s.nome})}>Rinomina</button>
                        <button style={{...b,color:"#A32D2D",borderColor:"#F09595"}} onClick={()=>remStu(s.id)}>Rimuovi</button>
                      </>
                    )}
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}
    </>
  );

  return (
    <div style={{fontFamily:"var(--font-sans)",color:"var(--color-text-primary)",maxWidth:720,margin:"0 auto",padding:"12px 16px"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        <img src="logo.png" alt="Logo" style={{height:isMobile?52:96,width:"auto",marginRight:4}} />
        <span style={{fontWeight:500,fontSize:isMobile?16:18,flex:1}}>Registro presenze</span>
        <span style={{fontSize:11,color:"var(--color-text-tertiary)",display:"flex",alignItems:"center",gap:4}}>
          <span style={{width:7,height:7,borderRadius:"50%",background:err?"#E24B4A":"#639922",display:"inline-block"}}></span>
          {err ? "offline" : "online"}
        </span>
        <span style={{fontSize:11,color:"var(--color-text-tertiary)"}}>{isSegreteria?"Segreteria":"Docente"}</span>
        <button style={{...b,padding:"5px 10px"}} onClick={onLogout}>Esci</button>
      </div>

      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{...inp,width:"auto",fontSize:isMobile?15:13,padding:isMobile?"7px 10px":"5px 10px"}} />
        <button style={view==="reg"?bBlue:b} onClick={()=>setView("reg")}>Registro</button>
        <button style={view==="stats"?bBlue:b} onClick={()=>setView("stats")}>Storico</button>
        {isSegreteria && <button style={view==="export"?bBlue:b} onClick={()=>setView("export")}>Esporta</button>}
        {isSegreteria && <button style={view==="manage"?bBlue:b} onClick={()=>setView("manage")}>Gestione</button>}
      </div>

      {err && (
        <div style={{marginBottom:12,padding:"10px 14px",background:"var(--color-background-danger)",border:"0.5px solid var(--color-border-danger)",borderRadius:"var(--border-radius-md)",fontSize:13,color:"var(--color-text-danger)"}}>
          {err} <button style={{...b,marginLeft:8,padding:"2px 10px"}} onClick={()=>{setLoading(true);loadAll();loadPresenze();}}>Riprova</button>
        </div>
      )}

      {loading ? (
        <div style={{padding:"40px 0",textAlign:"center",color:"var(--color-text-tertiary)",fontSize:14}}>Caricamento…</div>
      ) : isMobile ? (
        <div>
          <select value={selCls||""} onChange={e=>setSelCls(e.target.value)}
            style={{width:"100%",fontSize:15,padding:"10px 12px",marginBottom:14,borderRadius:"var(--border-radius-md)",border:"0.5px solid var(--color-border-secondary)",background:"var(--color-background-primary)",color:"var(--color-text-primary)"}}>
            {classes.length===0 && <option>Nessuna classe</option>}
            {classes.map(c=><option key={c.id} value={c.id}>{c.nome}</option>)}
          </select>
          {content}
        </div>
      ) : (
        <div style={{display:"flex",gap:12}}>
          <div style={{width:148,flexShrink:0}}>
            <div style={{fontSize:11,color:"var(--color-text-tertiary)",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6}}>Classi</div>
            {classes.length===0 && <div style={{fontSize:12,color:"var(--color-text-tertiary)"}}>Nessuna classe.{isSegreteria?" Creane una in Gestione.":""}</div>}
            {classes.map(c=>(
              <button key={c.id} onClick={()=>setSelCls(c.id)} style={{display:"block",width:"100%",textAlign:"left",padding:"7px 10px",borderRadius:"var(--border-radius-md)",cursor:"pointer",fontSize:13,fontWeight:selCls===c.id?500:400,background:selCls===c.id?"var(--color-background-secondary)":"transparent",border:selCls===c.id?"0.5px solid var(--color-border-secondary)":"0.5px solid transparent",color:"var(--color-text-primary)",marginBottom:3}}>{c.nome}</button>
            ))}
          </div>
          <div style={{flex:1,minWidth:0,overflowX:"auto"}}>{content}</div>
        </div>
      )}
    </div>
  );
}

function ExportView({ classes, students, tok }) {
  const [clsId, setClsId] = useState(classes[0]?.id || "");
  const [stuId, setStuId] = useState("");
  const [month, setMonth] = useState(new Date().toISOString().slice(0,7));
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState(null);

  const clsStudents = students.filter(s => s.classe_id === clsId);

  useEffect(() => {
    if (clsStudents.length && !clsStudents.find(s=>s.id===stuId)) setStuId(clsStudents[0].id);
    if (!clsStudents.length) setStuId("");
  }, [clsId, students]);

  const studentObj = students.find(s=>s.id===stuId);
  const clsObj = classes.find(c=>c.id===clsId);
  const safeName = (studentObj?.nome || "studente").replace(/[^a-zA-Z0-9]+/g,"_");

  const fetchRows = async () => {
    const { start, endExcl } = monthRange(month);
    const p = await sb(`presenze?select=*&studente_id=eq.${stuId}&data=gte.${start}&data=lt.${endExcl}&order=data,fascia`, {}, tok);
    return p || [];
  };

  const doRiepilogo = async () => {
    if (!stuId) return;
    setErr(null); setBusy(true);
    try {
      const rows = await fetchRows();
      let pr=0,as=0,ri=0,gi=0;
      rows.forEach(r => {
        if(r.stato==='presente')pr++; else if(r.stato==='assente')as++; else if(r.stato==='ritardo')ri++;
        if(r.giustificato && (r.stato==='assente'||r.stato==='ritardo'))gi++;
      });
      const data = [{
        Studente: studentObj?.nome || "",
        Classe: clsObj?.nome || "",
        Mese: month,
        "Ore presenti": pr,
        "Ore assenti": as,
        "Ore ritardo": ri,
        "di cui giustificate": gi,
      }];
      const ws = XLSX.utils.json_to_sheet(data);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Riepilogo");
      XLSX.writeFile(wb, `riepilogo_${safeName}_${month}.xlsx`);
    } catch(e){ setErr("Errore: "+e.message); } finally { setBusy(false); }
  };

  const doDettaglio = async () => {
    if (!stuId) return;
    setErr(null); setBusy(true);
    try {
      const rows = await fetchRows();
      const data = rows.map(r => ({
        Data: r.data,
        Fascia: `${r.fascia}–${HOUR_END[r.fascia]||""}`,
        Stato: r.stato,
        Giustificato: r.giustificato ? "Sì" : "No",
      }));
      if (!data.length) data.push({ Data:"", Fascia:"", Stato:"Nessun dato nel mese", Giustificato:"" });
      const ws = XLSX.utils.json_to_sheet(data);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Dettaglio");
      XLSX.writeFile(wb, `dettaglio_${safeName}_${month}.xlsx`);
    } catch(e){ setErr("Errore: "+e.message); } finally { setBusy(false); }
  };

  const MESE_LBL = (() => { const [y,m] = month.split("-"); return `${MESI[parseInt(m,10)-1]||""} ${y}`; })();

  const openBlank = () => {
    const w = window.open("", "_blank");
    if (!w) { setErr("Consenti i popup del browser per generare il PDF."); return null; }
    w.document.write("<p style='font-family:sans-serif;padding:24px;color:#555'>Generazione report…</p>");
    return w;
  };

  const reportHtml = (titolo, inner) => `<!DOCTYPE html><html lang="it"><head><meta charset="utf-8"><title>${titolo} — ${studentObj?.nome||""}</title>
<style>
@page{size:A4;margin:18mm;}
*{box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;color:#1a1a18;margin:0;}
.head{display:flex;align-items:center;gap:14px;border-bottom:2px solid #1F3864;padding-bottom:12px;margin-bottom:18px;}
.head img{height:54px;width:auto;}
.h1{font-size:18px;font-weight:600;color:#1F3864;}
.h2{font-size:13px;color:#2E75B5;}
.meta{font-size:13px;margin-bottom:16px;line-height:1.8;}
.meta b{color:#1F3864;}
table{border-collapse:collapse;width:100%;font-size:13px;}
th{background:#1F3864;color:#fff;text-align:left;padding:7px 10px;font-weight:500;}
td{padding:6px 10px;border-bottom:1px solid #dddddd;}
tr:nth-child(even) td{background:#f3f6fb;}
.foot{margin-top:24px;font-size:11px;color:#888888;border-top:1px solid #dddddd;padding-top:8px;}
</style></head><body>
<div class="head"><img src="${location.origin}/logo.png" onerror="this.style.display='none'"/><div><div class="h1">Registro presenze</div><div class="h2">${titolo}</div></div></div>
<div class="meta"><div><b>Studente:</b> ${studentObj?.nome||""}</div><div><b>Classe:</b> ${clsObj?.nome||""}</div><div><b>Mese:</b> ${MESE_LBL}</div></div>
${inner}
<div class="foot">Report generato il ${new Date().toLocaleDateString("it-IT")}</div>
<script>window.onload=function(){setTimeout(function(){window.print();},300);};<\/script>
</body></html>`;

  const pdfRiepilogo = async () => {
    if (!stuId) return;
    const w = openBlank(); if (!w) return;
    setErr(null); setBusy(true);
    try {
      const rows = await fetchRows();
      let pr=0,as=0,ri=0,gi=0;
      rows.forEach(r => { if(r.stato==='presente')pr++; else if(r.stato==='assente')as++; else if(r.stato==='ritardo')ri++; if(r.giustificato&&(r.stato==='assente'||r.stato==='ritardo'))gi++; });
      const inner = `<table><tr><th>Ore presenti</th><th>Ore assenti</th><th>Ore ritardo</th><th>di cui giustificate</th></tr><tr><td>${pr}</td><td>${as}</td><td>${ri}</td><td>${gi}</td></tr></table>`;
      w.document.open(); w.document.write(reportHtml("Riepilogo mensile", inner)); w.document.close();
    } catch(e){ setErr("Errore: "+e.message); try{w.close();}catch(_){} } finally { setBusy(false); }
  };

  const pdfDettaglio = async () => {
    if (!stuId) return;
    const w = openBlank(); if (!w) return;
    setErr(null); setBusy(true);
    try {
      const rows = await fetchRows();
      const body = rows.length
        ? rows.map(r => `<tr><td>${r.data.split("-").reverse().join("/")}</td><td>${r.fascia}–${HOUR_END[r.fascia]||""}</td><td>${r.stato}</td><td>${r.giustificato?"Sì":"No"}</td></tr>`).join("")
        : `<tr><td colspan="4" style="text-align:center;color:#888">Nessun dato registrato nel mese</td></tr>`;
      const inner = `<table><tr><th>Data</th><th>Fascia</th><th>Stato</th><th>Giustificato</th></tr>${body}</table>`;
      w.document.open(); w.document.write(reportHtml("Dettaglio mensile", inner)); w.document.close();
    } catch(e){ setErr("Errore: "+e.message); try{w.close();}catch(_){} } finally { setBusy(false); }
  };

  const lbl = {fontSize:12,color:"var(--color-text-tertiary)",textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:6};
  const sel = {width:"100%",maxWidth:320,fontSize:14,padding:"8px 10px",borderRadius:"var(--border-radius-md)",border:"0.5px solid var(--color-border-secondary)",background:"var(--color-background-primary)",color:"var(--color-text-primary)"};
  const dlBtn = {fontSize:14,padding:"9px 16px",borderRadius:"var(--border-radius-md)",cursor:stuId&&!busy?"pointer":"default",border:"none",background:stuId&&!busy?"#1F3864":"var(--color-background-secondary)",color:stuId&&!busy?"#fff":"var(--color-text-tertiary)",fontWeight:500};
  const dlBtn2 = {fontSize:14,padding:"9px 16px",borderRadius:"var(--border-radius-md)",cursor:stuId&&!busy?"pointer":"default",border:"0.5px solid var(--color-border-secondary)",background:"transparent",color:stuId&&!busy?"var(--color-text-primary)":"var(--color-text-tertiary)",fontWeight:500};

  return (
    <div style={{maxWidth:340}}>
      <div style={{fontSize:13,color:"var(--color-text-secondary)",marginBottom:16}}>Genera un archivio Excel mensile per un singolo studente.</div>

      <div style={{marginBottom:14}}>
        <div style={lbl}>Classe</div>
        <select value={clsId} onChange={e=>setClsId(e.target.value)} style={sel}>
          {classes.length===0 && <option value="">Nessuna classe</option>}
          {classes.map(c=><option key={c.id} value={c.id}>{c.nome}</option>)}
        </select>
      </div>

      <div style={{marginBottom:14}}>
        <div style={lbl}>Studente</div>
        <select value={stuId} onChange={e=>setStuId(e.target.value)} style={sel}>
          {clsStudents.length===0 && <option value="">Nessuno studente</option>}
          {clsStudents.map(s=><option key={s.id} value={s.id}>{s.nome}</option>)}
        </select>
      </div>

      <div style={{marginBottom:20}}>
        <div style={lbl}>Mese</div>
        <input type="month" value={month} onChange={e=>setMonth(e.target.value)} style={sel} />
      </div>

      {err && <div style={{fontSize:13,color:"var(--color-text-danger)",marginBottom:12}}>{err}</div>}

      <div style={{...lbl,marginTop:4}}>File Excel</div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:18}}>
        <button style={dlBtn} disabled={!stuId||busy} onClick={doRiepilogo}>{busy?"Attendere…":"Riepilogo .xlsx"}</button>
        <button style={dlBtn2} disabled={!stuId||busy} onClick={doDettaglio}>Dettaglio .xlsx</button>
      </div>

      <div style={lbl}>Report PDF</div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        <button style={dlBtn} disabled={!stuId||busy} onClick={pdfRiepilogo}>Riepilogo PDF</button>
        <button style={dlBtn2} disabled={!stuId||busy} onClick={pdfDettaglio}>Dettaglio PDF</button>
      </div>

      <div style={{fontSize:11,color:"var(--color-text-tertiary)",marginTop:14}}>
        Il <strong>riepilogo</strong> contiene i totali del mese (presenze, assenze, ritardi, di cui giustificate). Il <strong>dettaglio</strong> elenca ogni singola fascia oraria registrata.
      </div>
    </div>
  );
}

function StatsView({ cls, clsStudents, date, tok }) {
  const [stats, setStats] = useState(null);
  const [period, setPeriod] = useState("month");
  const [err, setErr] = useState(null);

  useEffect(() => {
    async function load() {
      try {
        setErr(null); setStats(null);
        let filter = "";
        if (period === "day") filter = `&data=eq.${date}`;
        else if (period === "month") { const { start, endExcl } = monthRange(date.slice(0,7)); filter = `&data=gte.${start}&data=lt.${endExcl}`; }
        const ids = clsStudents.map(s=>s.id);
        if (!ids.length) { setStats([]); return; }
        const p = await sb(`presenze?select=*&studente_id=in.(${ids.join(",")})${filter}`, {}, tok);
        const map = {};
        clsStudents.forEach(s => { map[s.id] = { ...s, presente:0, assente:0, ritardo:0, giustificate:0 }; });
        (p||[]).forEach(r => {
          if (!map[r.studente_id]) return;
          map[r.studente_id][r.stato]++;
          if (r.giustificato && (r.stato==='assente' || r.stato==='ritardo')) map[r.studente_id].giustificate++;
        });
        setStats(Object.values(map));
      } catch (e) { setErr("Errore: " + e.message); }
    }
    load();
  }, [period, date, cls.id, tok]);

  const b = {fontSize:13,padding:"5px 12px",border:"0.5px solid var(--color-border-secondary)",borderRadius:"var(--border-radius-md)",background:"transparent",cursor:"pointer",color:"var(--color-text-primary)"};
  const bA = {...b,background:"var(--color-background-secondary)",fontWeight:500,border:"0.5px solid var(--color-border-primary)"};
  const bBlue = {...b,background:"#1F3864",color:"#fff",fontWeight:500,border:"0.5px solid #1F3864"};
  const th = {fontSize:11,color:"var(--color-text-secondary)",fontWeight:400,textTransform:"uppercase",letterSpacing:"0.04em",padding:"8px 12px"};

  const labels = { day:"Giorno selezionato", month:"Mese corrente", all:"Tutto lo storico" };

  return (
    <React.Fragment>
      <div style={{display:"flex",gap:6,marginBottom:12,alignItems:"center",flexWrap:"wrap"}}>
        <span style={{fontSize:13,color:"var(--color-text-secondary)",marginRight:4}}>Periodo:</span>
        {Object.entries(labels).map(([k,v])=>(
          <button key={k} style={period===k?bBlue:b} onClick={()=>setPeriod(k)}>{v}</button>
        ))}
      </div>
      {err && <div style={{fontSize:13,color:"var(--color-text-danger)",marginBottom:10}}>{err}</div>}
      <div style={{fontSize:13,color:"var(--color-text-secondary)",marginBottom:10}}>Ore totali per <strong>{cls.nome}</strong> — {labels[period].toLowerCase()}.</div>
      <div style={{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-lg)",overflow:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",minWidth:420}}>
          <thead>
            <tr style={{background:"var(--color-background-secondary)",borderBottom:"0.5px solid var(--color-border-tertiary)"}}>
              <th style={{...th,textAlign:"left"}}>Studente</th>
              <th style={{...th,textAlign:"center"}}>Ore presenti</th>
              <th style={{...th,textAlign:"center"}}>Ore assenti</th>
              <th style={{...th,textAlign:"center"}}>Ore ritardo</th>
              <th style={{...th,textAlign:"center"}}>di cui giustif.</th>
            </tr>
          </thead>
          <tbody>
            {!stats && <tr><td colSpan={5} style={{padding:"16px 12px",fontSize:13,color:"var(--color-text-tertiary)"}}>Caricamento…</td></tr>}
            {stats && stats.length===0 && <tr><td colSpan={5} style={{padding:"16px 12px",fontSize:13,color:"var(--color-text-tertiary)"}}>Nessuno studente.</td></tr>}
            {stats && stats.map((s,i)=>(
              <tr key={s.id} style={{borderTop:i>0?"0.5px solid var(--color-border-tertiary)":"none"}}>
                <td style={{padding:"8px 12px",fontSize:14}}>{s.nome}</td>
                <td style={{textAlign:"center",fontSize:14,color:"#3B6D11",fontWeight:500}}>{s.presente}</td>
                <td style={{textAlign:"center",fontSize:14,color:"#A32D2D",fontWeight:500}}>{s.assente}</td>
                <td style={{textAlign:"center",fontSize:14,color:"#854F0B",fontWeight:500}}>{s.ritardo}</td>
                <td style={{textAlign:"center",fontSize:14,color:"#3B6D11",fontWeight:500}}>{s.giustificate}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
